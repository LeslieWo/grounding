# Render 部署蓝图。连上这个仓库后，Render 会照此建一个免费 Web 服务。
#
# 这个后端是**无状态**的：不挂盘、不存照片、不存卡片。个人数据全部留在客户端（手机）。
# 密钥都不写在这里（sync: false = 在 Render 后台手填，永不进仓库）。
services:
  - type: web
    name: grounding-agent
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements-server.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false                                   # LLM 供应商的 key（z.ai / OpenAI），后台手填
      - key: GROUNDING_API_KEY
        sync: false                                   # 客户端调这个后端要带的 key，后台手填
      - key: REQUIRE_API_KEY
        value: "1"                                    # 线上必须验 key；本地开发才设 0
      - key: OPENAI_BASE_URL
        value: https://api.z.ai/api/paas/v4/
      - key: GROUNDING_MODEL
        value: glm-4.6
      - key: INGEST_MODEL
        value: glm-4.5v
      - key: STRUCT_METHOD
        value: function_calling
      - key: DISABLE_THINKING
        value: "1"                                    # GLM 默认开深度思考，一句话要 20-35s；关掉 ~2s
